version: "3.9"

# Local development services for Forge
# Run: docker-compose up -d
# Then: python scripts/setup.sh

services:

  # PostgreSQL — Supabase replacement for local dev
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_local_pw
      POSTGRES_DB: forge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis — Recall Memory + BullMQ job queue
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Neo4j — Temporal Knowledge Graph
  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH: neo4j/forge_neo4j_pw
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"    # Browser UI
      - "7687:7687"    # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ChromaDB — per-project Codebase RAG
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0

  # Forge API — FastAPI backend
  forge-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://forge:forge_local_pw@postgres:5432/forge_db
      - REDIS_URL=redis://redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=forge_neo4j_pw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn forge.api.main:app --host 0.0.0.0 --port 8080 --reload

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  chroma_data:
